<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gestão de Tipos de Clientes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="css/tipocliente.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="js/TipoCliente.js"></script>

</head>

<body>

    <div class="container-fluid py-4">

        <!-- CABEÇALHO -->

        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>
            
        <button
           class="btn-voltar"
           onclick="window.location.href='http://192.168.10.84:8010/dashboard.html'">
           Voltar
        </button>

         <h1>Gestão de Tipos de Clientes</h1>

                <p class="text-muted">
                    Cadastro e gerenciamento dos tipos de clientes
                </p>

            </div>

            <button
                class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#modalTipoCliente">

                + Novo Tipo de Cliente

            </button>

        </div>

        <!-- FILTROS -->

        <div class="card p-4 mb-4">

            <div class="row">

                <div class="col-md-10">

                    <label class="form-label">
                        Descrição
                    </label>

                    <input
                        type="text"
                        id="txtPesquisa"
                        class="form-control"
                        placeholder="Pesquisar descrição">

                </div>

                <div class="col-md-2 d-flex align-items-end">

                    <button
                        type="button"
                        class="btn btn-primary w-100"
                        onclick="pesquisar()">

                        Pesquisar

                    </button>

                </div>

            </div>

        </div>

        <!-- TABELA -->

        <div class="card p-3">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead>

                        <tr>

                            <th>ID</th>
                            <th>Descrição</th>
                            <th>Percentual de Desconto</th>
                            <th>Status</th>
                            <th>Ações</th>

                        </tr>

                    </thead>

                    <tbody id="tabelaTiposClientes">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- MODAL -->

    <div
        class="modal fade"
        id="modalTipoCliente"
        tabindex="-1"
        aria-hidden="true">

        <div class="modal-dialog modal-xl modal-dialog-centered">

            <div class="modal-content border-0 shadow">

                <!-- CORPO -->

                <div class="modal-body p-5">

                    <div class="mb-4">

                        <h2 class="fw-bold text-primary">

                            Cadastro de Tipo de Cliente

                        </h2>

                        <p class="text-muted">

                            Gerencie os tipos de clientes utilizados no sistema

                        </p>

                    </div>

                    <form id="formTipoCliente">

                        <input
                            type="hidden"
                            id="id">

                        <div class="row g-4">

                            <div class="col-md-8">

                                <label class="form-label">

                                    Descrição *

                                </label>

                                <input
                                    type="text"
                                    id="descricao"
                                    class="form-control"
                                    placeholder="Digite a descrição">

                            </div>

                            <div class="col-md-4">

                                <label class="form-label">

                                    Percentual de Desconto

                                </label>

                                <input
                                    type="number"
                                    id="percentualDesconto"
                                    class="form-control"
                                    min="0"
                                    max="100"
                                    placeholder="0 a 100">

                            </div>

                            <div class="col-md-4">

                                <label class="form-label">

                                    Status *

                                </label>

                                <select
                                    id="status"
                                    class="form-select">

                                    <option value="true">

                                        Ativo

                                    </option>

                                    <option value="false">

                                        Inativo

                                    </option>

                                </select>

                            </div>

                        </div>

                    </form>

                </div>

                <!-- RODAPÉ -->

                <div class="modal-footer border-0 px-5 pb-4">

                    <button
                        type="button"
                        class="btn btn-light"
                        data-bs-dismiss="modal">

                        Cancelar

                    </button>

                    <button
                        type="button"
                        class="btn btn-primary px-4"
                        onclick="salvar()">

                        Salvar Tipo de Cliente

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
