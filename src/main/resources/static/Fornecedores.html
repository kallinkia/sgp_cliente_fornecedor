<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Fornecedores</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/Fornecedores.css">
    <script type="text/javascript" src="js/Fornecedores.js"></script>
</head>

<body>

    <div class="container-fluid py-4">

        <div class="topo">

            <div>
                <h1>Gestão de Fornecedores</h1>
                <p>Cadastro e gerenciamento de fornecedores</p>
            </div>

            <button
                class="btn btn-cadastrar"
                data-bs-toggle="modal"
                data-bs-target="#fornecedorModal">
                + Novo Fornecedor
            </button>

        </div>

        <div class="card filtro-card">

            <div class="row">

                <div class="col-md-5">
                    <label>Razão Social</label>
                    <input
                        type="text"
                        class="form-control"
                        placeholder="Pesquisar razão social">
                </div>

                <div class="col-md-5">
                    <label>CNPJ</label>
                    <input
                        type="text"
                        class="form-control"
                        placeholder="Pesquisar CNPJ">
                </div>

                <div class="col-md-2 d-flex align-items-end">
                    <button class="btn btn-primary w-100">
                        Pesquisar
                    </button>
                </div>

            </div>

        </div>

        <div class="card tabela-card">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead>

                        <tr>
                            <th>ID</th>
                            <th>Razão Social</th>
                            <th>Nome Fantasia</th>
                            <th>CNPJ</th>
                            <th>E-mail</th>
                            <th>Telefone</th>
                            <th>Contato</th>
                            <th>Cidade</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>

                    </thead>

                    <tbody>

                        <tr>

                            <td>1</td>
                            <td>Fornecedor Exemplo LTDA</td>
                            <td>Fornecedor Exemplo</td>
                            <td>00.000.000/0001-00</td>
                            <td>contato@email.com</td>
                            <td>(31)99999-9999</td>
                            <td>João Silva</td>
                            <td>Belo Horizonte</td>

                            <td>
                                <span class="status ativo">
                                    Ativo
                                </span>
                            </td>

                            <td>

                                <button
                                    class="btn btn-editar btn-sm"
                                    data-bs-toggle="modal"
                                    data-bs-target="#fornecedorModal">

                                    Editar

                                </button>

                                <button
                                    class="btn btn-excluir btn-sm">

                                    Excluir

                                </button>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- MODAL -->

    <div
        class="modal fade"
        id="fornecedorModal"
        tabindex="-1">

        <div class="modal-dialog modal-xl">

            <div class="modal-content">

                <div class="modal-header">

                    <h4>Cadastro de Fornecedor</h4>

                    <button
                        class="btn-close"
                        data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <form>

                        <div class="row g-3">

                            <div class="col-md-6">
                                <label>Razão Social *</label>
                                <input type="text" class="form-control">
                            </div>

                            <div class="col-md-6">
                                <label>Nome Fantasia *</label>
                                <input type="text" class="form-control">
                            </div>

                            <div class="col-md-4">
                                <label>CNPJ *</label>
                                <input type="text" class="form-control">
                            </div>

                            <div class="col-md-4">
                                <label>E-mail *</label>
                                <input type="email" class="form-control">
                            </div>

                            <div class="col-md-4">
                                <label>Telefone *</label>
                                <input type="text" class="form-control">
                            </div>

                            <div class="col-md-6">
                                <label>Contato Responsável *</label>
                                <input type="text" class="form-control">
                            </div>

                            <div class="col-md-6">
                                <label>Endereço</label>
                                <input type="text" class="form-control">
                            </div>

                            <div class="col-md-4">
                                <label>Cidade</label>
                                <input type="text" class="form-control">
                            </div>

                            <div class="col-md-4">
                                <label>Estado</label>
                                <input type="text" class="form-control">
                            </div>

                            <div class="col-md-4">
                                <label>Prazo Médio Entrega</label>
                                <input type="number" class="form-control">
                            </div>

                            <div class="col-md-4">
                                <label>Status</label>

                                <select class="form-select">

                                    <option>Ativo</option>
                                    <option>Inativo</option>

                                </select>

                            </div>

                        </div>

                    </form>

                </div>

                <div class="modal-footer">

                    <button
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">

                        Cancelar

                    </button>

                    <button
                        class="btn btn-salvar">

                        Salvar

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
