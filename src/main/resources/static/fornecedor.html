<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGP - Cadastro de Fornecedores</title>

    <link rel="stylesheet" href="css/fornecedor.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script type="text/javascript" src"js/Fornecedores.js"></script>
    
</head>
<body>

<div class="container">

    <div class="card">

        <div class="titulo">
            <h1>Cadastro de Fornecedores</h1>
            <p>Gerencie os fornecedores responsáveis pelo fornecimento de peças</p>
        </div>

        <form>

            <div class="grid">

                <div class="campo">
                    <label>Razão Social *</label>
                    <div class="input-box">
                        <i class="fa-solid fa-building"></i>
                        <input type="text" required>
                    </div>
                </div>

                <div class="campo">
                    <label>Nome Fantasia *</label>
                    <div class="input-box">
                        <i class="fa-solid fa-store"></i>
                        <input type="text" required>
                    </div>
                </div>

                <div class="campo">
                    <label>CNPJ *</label>
                    <div class="input-box">
                        <i class="fa-solid fa-id-card"></i>
                        <input type="text" required>
                    </div>
                </div>

                <div class="campo">
                    <label>E-mail *</label>
                    <div class="input-box">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" required>
                    </div>
                </div>

                <div class="campo">
                    <label>Telefone *</label>
                    <div class="input-box">
                        <i class="fa-solid fa-phone"></i>
                        <input type="tel" required>
                    </div>
                </div>

                <div class="campo">
                    <label>Contato Responsável *</label>
                    <div class="input-box">
                        <i class="fa-solid fa-user-tie"></i>
                        <input type="text" required>
                    </div>
                </div>

                <div class="campo campo-full">
                    <label>Endereço</label>
                    <div class="input-box">
                        <i class="fa-solid fa-location-dot"></i>
                        <input type="text">
                    </div>
                </div>

                <div class="campo">
                    <label>Cidade</label>
                    <div class="input-box">
                        <i class="fa-solid fa-city"></i>
                        <input type="text">
                    </div>
                </div>

                <div class="campo">
                    <label>Estado</label>
                    <div class="input-box">
                        <i class="fa-solid fa-map"></i>
                        <input type="text">
                    </div>
                </div>

                <div class="campo">
                    <label>Prazo Médio de Entrega (dias)</label>
                    <div class="input-box">
                        <i class="fa-solid fa-truck"></i>
                        <input type="number" min="0">
                    </div>
                </div>

                <div class="campo">
                    <label>Status *</label>

                    <div class="radio-group">

                        <label>
                            <input type="radio" name="status" checked>
                            Ativo
                        </label>

                        <label>
                            <input type="radio" name="status">
                            Inativo
                        </label>

                    </div>
                </div>

            </div>

            <div class="acoes">

                <button type="reset" class="btn-cancelar">
                    Cancelar
                </button>

                <button type="submit" class="btn-salvar">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Salvar Fornecedor
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
