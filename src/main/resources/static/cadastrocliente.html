<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGP - Cadastro de Clientes</title>

    <link rel="stylesheet" href="css/cadastrocliente.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="card">

        <div class="titulo">
            <h1>Cadastro de Clientes</h1>
            <p>Preencha os dados para cadastrar um novo cliente</p>
        </div>

        <form>

            <div class="grid">

                <div class="campo">
                    <label>Nome / Razão Social *</label>
                    <div class="input-box">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" minlength="3" required>
                    </div>
                </div>

                <div class="campo">
                    <label>CPF / CNPJ *</label>
                    <div class="input-box">
                        <i class="fa-solid fa-id-card"></i>
                        <input type="text" required>
                    </div>
                </div>

                <div class="campo">
                    <label>E-mail</label>
                    <div class="input-box">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email">
                    </div>
                </div>

                <div class="campo">
                    <label>Telefone *</label>
                    <div class="input-box">
                        <i class="fa-solid fa-phone"></i>
                        <input type="tel" required>
                    </div>
                </div>

                <div class="campo campo-full">
                    <label>Endereço</label>
                    <div class="input-box">
                        <i class="fa-solid fa-location-dot"></i>
                        <input type="text">
                    </div>
                </div>

                <div class="campo">
                    <label>Cidade</label>
                    <div class="input-box">
                        <i class="fa-solid fa-city"></i>
                        <input type="text">
                    </div>
                </div>

                <div class="campo">
                    <label>Estado</label>
                    <div class="input-box">
                        <i class="fa-solid fa-map"></i>
                        <input type="text">
                    </div>
                </div>

                <div class="campo">
                    <label>Tipo de Cliente *</label>
                    <div class="input-box">
                        <i class="fa-solid fa-users"></i>

                        <select required>
                            <option value="">Selecione</option>
                            <option>Pessoa Física</option>
                            <option>Pessoa Jurídica</option>
                        </select>
                    </div>
                </div>

                <div class="campo">
                    <label>Ativo *</label>

                    <div class="radio-group">

                        <label>
                            <input type="radio" name="ativo" checked>
                            Sim
                        </label>

                        <label>
                            <input type="radio" name="ativo">
                            Não
                        </label>

                    </div>
                </div>

            </div>

            <div class="acoes">

                <button type="reset" class="btn-cancelar">
                    Cancelar
                </button>

                <button type="submit" class="btn-salvar">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Salvar Cliente
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
