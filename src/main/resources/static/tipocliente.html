<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGP - Tipos de Clientes</title>

    <link rel="stylesheet" href="css/tipocliente.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="card">

        <div class="titulo">
            <h1>Cadastro de Tipos de Clientes</h1>
            <p>Classifique os clientes conforme seu perfil comercial</p>
        </div>

        <form>

            <div class="grid">

                <div class="campo campo-full">
                    <label>Descrição *</label>

                    <div class="input-box">
                        <i class="fa-solid fa-tags"></i>
                        <input
                            type="text"
                            placeholder="Ex.: Pessoa Física, Revendedor..."
                            required
                        >
                    </div>
                </div>

                <div class="campo">
                    <label>Percentual de Desconto (%)</label>

                    <div class="input-box">
                        <i class="fa-solid fa-percent"></i>
                        <input
                            type="number"
                            min="0"
                            max="100"
                            step="0.01"
                            placeholder="0,00"
                        >
                    </div>
                </div>

                <div class="campo">

                    <label>Status *</label>

                    <div class="radio-group">

                        <label>
                            <input
                                type="radio"
                                name="status"
                                checked
                            >
                            Ativo
                        </label>

                        <label>
                            <input
                                type="radio"
                                name="status"
                            >
                            Inativo
                        </label>

                    </div>

                </div>

            </div>

            <div class="exemplos">

                <h3>Exemplos de Tipos de Clientes</h3>

                <div class="badges">
                    <span>Pessoa Física</span>
                    <span>Pessoa Jurídica</span>
                    <span>Revendedor</span>
                    <span>Oficina Parceira</span>
                    <span>Cliente Premium</span>
                </div>

            </div>

            <div class="acoes">

                <button type="reset" class="btn-cancelar">
                    Cancelar
                </button>

                <button type="submit" class="btn-salvar" data-bs-target="#cadastroModal" onclick="salvarNome();">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Salvar Tipo
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
