<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SGP - Tipos de Clientes</title>

<link rel="stylesheet" href="css/tipocliente.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="card-listagem">

    <div class="topo-listagem">

        <h2>
            <i class="fa-solid fa-users"></i>
            Tipos de Clientes Cadastrados
        </h2>

        <button
            type="button"
            class="btn-salvar"
            data-bs-toggle="modal"
            data-bs-target="#modalTipoCliente">

            <i class="fa-solid fa-plus"></i>
            Novo Tipo de Cliente

        </button>

    </div>

    <div class="filtro">

        <div class="input-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="text"
                placeholder="Pesquisar por descrição...">

        </div>

    </div>

    <table>

        <thead>

            <tr>
                <th>Código</th>
                <th>Descrição</th>
                <th>Desconto (%)</th>
                <th>Status</th>
                <th>Ações</th>
            </tr>

        </thead>

        <tbody>

            <tr>

                <td>1</td>
                <td>Pessoa Física</td>
                <td>5%</td>
                <td>Ativo</td>

                <td>

                    <button class="btn-editar">
                        <i class="fa-solid fa-pen"></i>
                    </button>

                    <button class="btn-excluir">
                        <i class="fa-solid fa-trash"></i>
                    </button>

                </td>

            </tr>

            <tr>

                <td>2</td>
                <td>Pessoa Jurídica</td>
                <td>10%</td>
                <td>Ativo</td>

                <td>

                    <button class="btn-editar">
                        <i class="fa-solid fa-pen"></i>
                    </button>

                    <button class="btn-excluir">
                        <i class="fa-solid fa-trash"></i>
                    </button>

                </td>

            </tr>

            <tr>

                <td>3</td>
                <td>Revendedor</td>
                <td>15%</td>
                <td>Ativo</td>

                <td>

                    <button class="btn-editar">
                        <i class="fa-solid fa-pen"></i>
                    </button>

                    <button class="btn-excluir">
                        <i class="fa-solid fa-trash"></i>
                    </button>

                </td>

            </tr>

            <tr>

                <td>4</td>
                <td>Cliente Premium</td>
                <td>20%</td>
                <td>Ativo</td>

                <td>

                    <button class="btn-editar">
                        <i class="fa-solid fa-pen"></i>
                    </button>

                    <button class="btn-excluir">
                        <i class="fa-solid fa-trash"></i>
                    </button>

                </td>

            </tr>

        </tbody>

    </table>

</div>

<!-- ==========================================
     MODAL CADASTRO TIPO DE CLIENTE
========================================== -->

<div class="modal fade"
     id="modalTipoCliente"
     tabindex="-1"
     aria-hidden="true">

    <div class="modal-dialog modal-lg">

        <div class="modal-content">

            <div class="modal-header">

                <h4 class="modal-title">
                    <i class="fa-solid fa-user-tag"></i>
                    Cadastro de Tipo de Cliente
                </h4>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <div class="grid-modal">

                    <div class="campo-modal">
                        <label>Código</label>

                        <input
                            type="text"
                            class="form-control"
                            value="AUTO"
                            readonly>
                    </div>

                    <div class="campo-modal">
                        <label>Status *</label>

                        <select class="form-control">
                            <option>Ativo</option>
                            <option>Inativo</option>
                        </select>
                    </div>

                   <div class="campo-modal campo-full">

    <label>Descrição *</label>

    <select class="form-control" required>

        <option value="">
            Selecione um tipo de cliente
        </option>

        <option value="PESSOA_FISICA">
            Pessoa Física
        </option>

        <option value="PESSOA_JURIDICA">
            Pessoa Jurídica
        </option>

        <option value="REVENDEDOR">
            Revendedor
        </option>

        <option value="CLIENTE_PREMIUM">
            Cliente Premium
        </option>

        <option value="OFICINA_PARCEIRA">
            Oficina Parceira
        </option>

        <option value="DISTRIBUIDOR">
            Distribuidor
        </option>

        <option value="ATACADISTA">
            Atacadista
        </option>

        <option value="VAREJISTA">
            Varejista
        </option>

        <option value="CLIENTE_FIDELIZADO">
            Cliente Fidelizado
        </option>

        <option value="CLIENTE_ESPECIAL">
            Cliente Especial
        </option>

    </select>

</div>
                    <div class="campo-modal">

                        <label>Percentual de Desconto (%)</label>

                        <input
                            type="number"
                            class="form-control"
                            min="0"
                            max="100"
                            step="0.01"
                            placeholder="0,00">

                    </div>

                    <div class="campo-modal">

                        <label>Limite de Crédito</label>

                        <input
                            type="number"
                            class="form-control"
                            placeholder="R$ 0,00">

                    </div>

                    <div class="campo-modal">

                        <label>Prazo de Pagamento (Dias)</label>

                        <input
                            type="number"
                            class="form-control"
                            placeholder="30">

                    </div>

                    <div class="campo-modal campo-full">

                        <label>Observações</label>

                        <textarea
                            class="form-control"
                            rows="4"
                            placeholder="Digite observações sobre este tipo de cliente"></textarea>

                    </div>

                </div>

            </div>

            <div class="modal-footer">

                <button
                    type="button"
                    class="btn-cancelar"
                    data-bs-dismiss="modal">

                    Cancelar

                </button>

                <button
                    type="submit"
                    class="btn-salvar">

                    <i class="fa-solid fa-floppy-disk"></i>
                    Salvar

                </button>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
