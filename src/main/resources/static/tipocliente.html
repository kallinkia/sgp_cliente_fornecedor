<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SGP - Tipos de Clientes</title>

    <script type="text/javascript" src="js/TipoCliente.js"></script>

    <link rel="stylesheet" href="css/tipocliente.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body>

    <div class="container-fluid py-4">

        <div class="card-listagem">

            <!-- TOPO -->
            <div class="topo-listagem">

                <h2>
                    <i class="fa-solid fa-users"></i>
                    Tipos de Clientes Cadastrados
                </h2>

                <button type="button"
                    class="btn-salvar"
                    data-bs-toggle="modal"
                    data-bs-target="#modalTipoCliente">

                    <i class="fa-solid fa-plus"></i>
                    Novo Tipo de Cliente

                </button>

            </div>

            <!-- FILTRO -->
            <div class="filtro">

                <div class="input-box">

                    <i class="fa-solid fa-magnifying-glass"></i>

                    <input type="text"
                        class="form-control"
                        placeholder="Pesquisar por descrição...">

                </div>

            </div>

            <!-- TABELA RESPONSIVA -->
            <div class="table-responsive">

                <table class="table table-hover align-middle tabela-clientes">

                    <thead>

                        <tr>
                            <th>Código</th>
                            <th>Descrição</th>
                            <th>Desconto (%)</th>
                            <th>Limite Crédito</th>
                            <th>Prazo Pagamento</th>
                            <th>Status</th>
                            <th class="text-center">Ações</th>
                        </tr>

                    </thead>

                    <tbody id="tabelaTipoCliente">

                        <!--
                            Os registros serão carregados
                            dinamicamente pelo método listarTodos()
                        -->

                    </tbody>

                </table>

            </div>

            <!-- MENSAGEM SEM REGISTROS -->
            <div id="mensagemSemRegistros" class="text-center py-5">

                <i class="fa-solid fa-circle-info fa-3x mb-3"></i>

                <h5>Nenhum registro encontrado</h5>

                <p>
                    Clique em "Novo Tipo de Cliente" para realizar o primeiro cadastro.
                </p>

            </div>

        </div>

    </div>

    <!-- =====================================================
         MODAL CADASTRO DE TIPO DE CLIENTE
    ====================================================== -->

    <div class="modal fade"
        id="modalTipoCliente"
        tabindex="-1"
        aria-hidden="true">

        <div class="modal-dialog modal-lg">

            <div class="modal-content">

                <div class="modal-header">

                    <h4 class="modal-title">

                        <i class="fa-solid fa-user-tag"></i>
                        Cadastro de Tipo de Cliente

                    </h4>

                    <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <div class="grid-modal">

                        <!-- CÓDIGO -->
                        <div class="campo-modal">

                            <label>Código</label>

                            <input type="text"
                                class="form-control"
                                readonly
                                placeholder="Gerado automaticamente">

                        </div>

                        <!-- STATUS -->
                        <div class="campo-modal">

                            <label>Status *</label>

                            <select class="form-control">

                                <option value="true">Ativo</option>
                                <option value="false">Inativo</option>

                            </select>

                        </div>

                        <!-- DESCRIÇÃO -->
                        <div class="campo-modal campo-full">

                            <label>Descrição *</label>

                            <textarea id="descricao" rows="5" cols="10"></textarea>

                        </div>

                        <!-- DESCONTO -->
                        <div class="campo-modal">

                            <label>Percentual de Desconto (%)</label>

                            <input type="number"
                                class="form-control"
                                min="0"
                                max="100"
                                step="0.01"
                                placeholder="0,00">

                        </div>

                        <!-- LIMITE -->
                        <div class="campo-modal">

                            <label>Limite de Crédito</label>

                            <input type="number"
                                class="form-control"
                                placeholder="R$ 0,00">

                        </div>

                        <!-- PRAZO -->
                        <div class="campo-modal">

                            <label>Prazo de Pagamento (Dias)</label>

                            <input type="number"
                                class="form-control"
                                placeholder="30">

                        </div>

                        <!-- OBSERVAÇÃO -->
                        <div class="campo-modal campo-full">

                            <label>Observações</label>

                            <textarea class="form-control"
                                rows="4"
                                placeholder="Digite observações sobre este tipo de cliente"></textarea>

                        </div>

                    </div>

                </div>

                <div class="modal-footer">

                    <button type="button"
                        class="btn-cancelar"
                        data-bs-dismiss="modal">

                        <i class="fa-solid fa-xmark"></i>
                        Cancelar

                    </button>

                    <button type="submit"  class="btn-salvar" onclick="salvar()">  <i class="fa-solid fa-floppy-disk"></i>
                        Salvar

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
