
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação de Fornecedores</title>

    <link rel="stylesheet" href="css/avaliacaofornecedor.css">
    <script src="js/AvaliacaoFornecedor.js" defer></script>
</head>
<body>

<div class="container">

    <div class="card">

        <div class="header">
        
         <button
           class="btn-voltar"
           onclick="voltarPagina()">
           Voltar
         </button>
        
            <h1>⭐ Avaliação de Fornecedores</h1>
            
          

            <button class="btn-nova-avaliacao"
                    onclick="abrirModal('Nova Avaliação')">
                + Nova Avaliação
            </button>
        </div>

        <div class="table-responsive">

            <table class="tabela-fornecedores">

                <thead>
                    <tr>
                        <th>Fornecedor</th>
                        <th>Categoria</th>
                        <th>Cidade</th>
                        <th>Avaliação Média</th>
                    </tr>
                </thead>

                <tbody id="tabela">

				
                </tbody>

            </table>

        </div>

    </div>

</div>

<!-- MODAL -->

<div id="modalAvaliacao" class="modal">

    <div class="modal-content">

        <div class="modal-header">

            <h2 id="nomeFornecedor"></h2>

            <button class="btn-fechar"
                    onclick="fecharModal()">
                ✕
            </button>

        </div>



		
        <div class="modal-body">

		
				<div class="campo">
	    <label for="fornecedor">Fornecedor </label>
	
	    <select id="select" required>
	       
	    </select>
	</div>
		

            <label>Data da Avaliação</label>
            <input type="date" id="dataDaAvaliacao" required="required">

            <div class="campo-avaliacao">
                <span>Qualidade das Peças</span>

                <div class="rating" data-campo="qualidadeDasPecas">
                    <span class="star" onclick="avaliar(this,1)">★</span>
                    <span class="star" onclick="avaliar(this,2)">★</span>
                    <span class="star" onclick="avaliar(this,3)">★</span>
                    <span class="star" onclick="avaliar(this,4)">★</span>
                    <span class="star" onclick="avaliar(this,5)">★</span>
                </div>
            </div>

            <div class="campo-avaliacao">
                <span>Prazo de Entrega</span>

                <div class="rating" data-campo="prazoDeEntrega">
                    <span class="star" onclick="avaliar(this,1)">★</span>
                    <span class="star" onclick="avaliar(this,2)">★</span>
                    <span class="star" onclick="avaliar(this,3)">★</span>
                    <span class="star" onclick="avaliar(this,4)">★</span>
                    <span class="star" onclick="avaliar(this,5)">★</span>
                </div>
            </div>

            <div class="campo-avaliacao">
                <span>Atendimento</span>

                <div class="rating" data-campo="atendimento">
                    <span class="star" onclick="avaliar(this,1)">★</span>
                    <span class="star" onclick="avaliar(this,2)">★</span>
                    <span class="star" onclick="avaliar(this,3)">★</span>
                    <span class="star" onclick="avaliar(this,4)">★</span>
                    <span class="star" onclick="avaliar(this,5)">★</span>
                </div>
            </div>

            <div class="campo-avaliacao">
                <span>Preço</span>

                <div class="rating" data-campo="preco">
                    <span class="star" onclick="avaliar(this,1)">★</span>
                    <span class="star" onclick="avaliar(this,2)">★</span>
                    <span class="star" onclick="avaliar(this,3)">★</span>
                    <span class="star" onclick="avaliar(this,4)">★</span>
                    <span class="star" onclick="avaliar(this,5)">★</span>
                </div>
            </div>

            <label for="observacoes">Observações</label>
            <textarea id="observacoes"></textarea>

        </div>

        <div class="modal-footer">

            <button class="btn-cancelar"
                    onclick="fecharModal()">
                Cancelar
            </button>

            <button class="btn-salvar"
                    onclick="salvarAvaliacao()">
                Salvar Avaliação
            </button>

        </div>

    </div>

</div>

</body>
</html>
