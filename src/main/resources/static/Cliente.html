<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Clientes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/cliente.css" rel="stylesheet">

    <script type="text/javascript" src="js/Cliente.js"></script>
</head>

<body>

    <div class="container-fluid py-4">

        <!-- CABEÇALHO -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>
            
         <button
           class="btn-voltar"
           onclick="window.location.href='http://192.168.10.84:8010/dashboard.html'">
           Voltar
         </button>
            
                <h1>Gestão de Clientes</h1>
                <p class="text-muted">
                    Cadastro e gerenciamento de clientes
                </p>
            </div>

            <div>

                <button
                    class="btn btn-primary"
                    data-bs-toggle="modal"
                    data-bs-target="#clienteModal">

                    + Novo Cliente

                </button>

            </div>

        </div>

        <!-- FILTROS -->
        <div class="card p-4 mb-4">

            <div class="row">

                <div class="col-md-5">

                    <label class="form-label">
                        Nome / Razão Social
                    </label>

                    <input
                        type="text"
                        id="filtroNome"
                        class="form-control"
                        placeholder="Pesquisar cliente">

                </div>

                <div class="col-md-5">

                    <label class="form-label">
                        CPF ou CNPJ
                    </label>

                    <input
                        type="text"
                        id="filtroDocumento"
                        class="form-control"
                        placeholder="Pesquisar CPF ou CNPJ">

                </div>

                <div class="col-md-2 d-flex align-items-end">

                    <button
                        type="button"
                        class="btn btn-primary w-100"
                        onclick="pesquisar()">

                        Pesquisar

                    </button>

                </div>

            </div>

        </div>

        <!-- TABELA -->
        <div class="card p-3">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead>

                        <tr>
                            <th>ID</th>
                            <th>Nome / Razão Social</th>
                            <th>CPF</th>
                            <th>CNPJ</th>
                            <th>E-mail</th>
                            <th>Telefone</th>
                            <th>Cidade</th>
                            <th>Tipo</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>

                    </thead>

                    <tbody id="cliente">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- MODAL CADASTRO CLIENTE -->
    <div
        class="modal fade"
        id="clienteModal"
        tabindex="-1"
        aria-hidden="true">

        <div class="modal-dialog modal-xl modal-dialog-centered">

            <div class="modal-content border-0 shadow">

                <div class="modal-body p-5">

                    <div class="mb-4">

                        <h2 class="fw-bold text-primary">
                            Cadastro de Clientes
                        </h2>

                        <p class="text-muted">
                            Gerencie os clientes cadastrados
                        </p>

                    </div>

                    <form id="formCliente">

                        <div class="row g-4">

                            <div class="col-md-6">

                                <label class="form-label">
                                    Nome / Razão Social *
                                </label>

                                <input
                                   type="text"
                                   id="nome_razaoSocial"
                                   class="form-control"
                                   required>

                            </div>

                            <div class="col-md-6">

                                <label class="form-label">
                                    E-mail *
                                </label>

                                <input
                                    type="email"
                                    id="email"
                                    class="form-control"
                                    required>

                            </div>

                            <div class="col-md-6">

                                <label class="form-label">
                                    CPF
                                </label>

                                <input
                                    type="text"
                                    id="cpf"
                                    class="form-control">

                            </div>

                            <div class="col-md-6">

                                <label class="form-label">
                                    CNPJ
                                </label>

                                <input
                                    type="text"
                                    id="cnpj"
                                    class="form-control">

                            </div>

                            <div class="col-md-6">

                                <label class="form-label">
                                    Telefone *
                                </label>

                                <input
                                    type="text"
                                    id="telefone"
                                    class="form-control"
                                    required>

                            </div>

                            <div class="col-md-6">

                                <label class="form-label">
                                    Tipo *
                                </label>

                                <select
                                    id="tipo"
                                    class="form-select">

                                    <option value="">
                                        Selecione
                                    </option>

                                    <option value="PESSOA_FISICA">
                                        Pessoa Física
                                    </option>

                                    <option value="PESSOA_JURIDICA">
                                        Pessoa Jurídica
                                    </option>

                                    <option value="PREMIUM">
                                        Cliente Premium
                                    </option>

                                </select>

                            </div>

                            <div class="col-12">

                                <label class="form-label">
                                    Endereço
                                </label>

                                <input
                                    type="text"
                                    id="endereco"
                                    class="form-control">

                            </div>

                            <div class="col-md-6">

                                <label class="form-label">
                                    Cidade
                                </label>

                                <input
                                    type="text"
                                    id="cidade"
                                    class="form-control">

                            </div>

                            <div class="col-md-6">

                                <label class="form-label">
                                    Estado
                                </label>

                                <input
                                    type="text"
                                    id="estado"
                                    class="form-control">

                            </div>

                            <div class="col-md-6">

                                <label class="form-label">
                                    Status
                                </label>

                                <select
                                    id="ativo"
                                    class="form-select">

                                    <option value="true">
                                        Ativo
                                    </option>

                                    <option value="false">
                                        Inativo
                                    </option>

                                </select>

                            </div>

                        </div>

                    </form>

                </div>

                <div class="modal-footer border-0 px-5 pb-4">

                    <button
                        type="button"
                        class="btn btn-light"
                        data-bs-dismiss="modal">

                        Cancelar

                    </button>

                    <button
                        type="button"
                        class="btn btn-primary px-4"
                        onclick="salvar()">

                        Salvar Cliente

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
